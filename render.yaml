services:
  - type: web
    name: skywave
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skywave-db
          property: connectionString
    autoDeploy: false

databases:
  - name: skywave-db
    plan: free
    region: oregon
    databaseName: skywave_db
    user: skywave
